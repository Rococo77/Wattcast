name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ml:
    name: ML — lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check ml
      - name: Tests (pytest)
        run: pytest

  web:
    name: Dashboard — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Build static site
        working-directory: web
        run: bun run build

  deploy:
    name: Deploy to Cloudflare (push to main)
    needs: [ml, web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Mapped here so the deploy step can gate on them via the `env` context.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Build static site
        working-directory: web
        run: bun run build
      # Deploys the committed data snapshot; the daily workflow redeploys with
      # fresh data each morning. Skipped automatically if the secret is unset.
      - name: Deploy
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        working-directory: web
        run: bunx wrangler deploy
